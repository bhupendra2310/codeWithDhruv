<div class="page-wrapper">

  <div class="container-color container">
  <h2 class="text-center">🎨 Color Picker Tool</h2>
  <p class="subtitle text-center">Choose a color and copy HEX or RGB instantly</p>

  <div class="row mt-4">

    <!-- LEFT SIDE (Color Picker) -->
    <div class="col-md-6 text-center">
      <div class="picker-section">
        <input type="color" id="picker" value="#c32222">
      </div>
    </div>

    <!-- RIGHT SIDE (Preview + Info) -->
    <div class="col-md-6">

      <!-- Preview -->
      <div id="colorPreview" class="preview-box mb-3">
        <p>Preview Area</p>
      </div>

      <!-- HEX -->
      <div class="info-box flex-div">
        <p><strong>HEX:</strong> <span id="hexOutput">#000000</span></p>
        <button id="copyHex">
            <svg style="color: #fbb03b;" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"  fill="#fbb03"     style="cursor: pointer;"   >
           <path d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-560h80v560h440v80H200Zm160-240v-480 480Z"/>
       </svg>
        </button>
      </div>

      <!-- RGB -->
      <div class="info-box flex-div">
        <p><strong>RGB:</strong> <span id="rgbOutput">rgb(0, 0, 0)</span></p>
        <button id="copyRgb" >
          <svg style="color: #fbb03b;" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"  fill="#fbb03"     style="cursor: pointer;"   >
           <path d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-560h80v560h440v80H200Zm160-240v-480 480Z"/>
       </svg>
      </button>
      </div>

      <p id="copyMsg" class="copy-msg"></p>
    </div>

  </div>
</div>

</div>
